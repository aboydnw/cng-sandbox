name: CNG Sandbox CI

on:
  push:
    branches: [main]
  pull_request:

permissions: read-all # zizmor: ignore[excessive-permissions]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ingestion
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libmagic1

      - name: Install cng-toolkit
        run: pip install -e "../geo-conversions[all]"

      - name: Install ingestion deps
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: pip install ruff && ruff check src/ tests/

      - name: Check formatting with ruff
        run: ruff format --check src/ tests/

      - name: Run tests
        run: python -m pytest tests/ -v --ignore=tests/test_integration.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - run: corepack enable && yarn install --immutable

      - name: Lint
        run: npx eslint src/ --max-warnings 0

      - name: Check formatting
        run: npx prettier --check 'src/**/*.{ts,tsx,css}'

      - run: npx tsc --noEmit

      - run: npx vitest run

  actions-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install zizmor
        run: pip install zizmor
      - name: Audit GitHub Actions
        run: zizmor --min-severity medium .github/

  proxy-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Check Vite/Caddy proxy parity
        run: bash scripts/check-proxy-parity.sh

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - run: cp .env.example .env
      - run: docker compose build

  pr-size-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check PR size
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          LINES=$(git diff --numstat "origin/$BASE_REF"...HEAD | awk '{s+=$1+$2} END {print s+0}')
          echo "Total changed lines: $LINES"
          if [ "$LINES" -gt 500 ]; then
            gh pr comment "$PR_NUMBER" \
              --body "**Large PR warning:** This PR changes $LINES lines. Consider breaking it into smaller changes for easier review."
          fi
