services:
  database:
    image: ghcr.io/stac-utils/pgstac:v0.9.6
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  stac-api:
    image: ghcr.io/stac-utils/stac-fastapi-pgstac:5.0.2
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASS: ${POSTGRES_PASSWORD}
      POSTGRES_DBNAME: ${POSTGRES_DB}
      POSTGRES_HOST_READER: database
      POSTGRES_HOST_WRITER: database
      POSTGRES_PORT: 5432
      DB_MIN_CONN_SIZE: 1
      DB_MAX_CONN_SIZE: 1
      ENABLE_TRANSACTIONS_EXTENSIONS: "TRUE"
    ports:
      - "8081:8080"
    depends_on:
      database:
        condition: service_healthy

  raster-tiler:
    image: ghcr.io/stac-utils/titiler-pgstac:1.7.2
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASS: ${POSTGRES_PASSWORD}
      POSTGRES_DBNAME: ${POSTGRES_DB}
      POSTGRES_HOST: database
      POSTGRES_PORT: 5432
      AWS_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      AWS_ENDPOINT_URL: ${R2_ENDPOINT}
      AWS_S3_ENDPOINT: ${R2_ACCOUNT_ID}.r2.cloudflarestorage.com
      AWS_HTTPS: "YES"
      AWS_VIRTUAL_HOSTING: "FALSE"
      GDAL_CACHEMAX: "75%"
      VSI_CACHE: "TRUE"
      VSI_CACHE_SIZE: "536870912"
      MOSAIC_CONCURRENCY: 1
    ports:
      - "8082:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      database:
        condition: service_healthy

  cog-tiler:
    image: ghcr.io/developmentseed/titiler:0.19.1
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      GDAL_CACHEMAX: "75%"
      VSI_CACHE: "TRUE"
      VSI_CACHE_SIZE: "536870912"
    ports:
      - "8084:80"

  vector-tiler:
    image: ghcr.io/developmentseed/tipg:1.0.1
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASS: ${POSTGRES_PASSWORD}
      POSTGRES_DBNAME: ${POSTGRES_DB}
      POSTGRES_HOST: database
      POSTGRES_PORT: 5432
      TIPG_CATALOG_TTL: 5
    ports:
      - "8083:80"
    depends_on:
      database:
        condition: service_healthy

  ingestion:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    ports:
      - "8000:8000"
    environment:
      S3_BUCKET: ${S3_BUCKET}
      S3_ENDPOINT: ${R2_ENDPOINT}
      AWS_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      STAC_API_URL: http://stac-api:8080
      RASTER_TILER_URL: http://raster-tiler:80
      VECTOR_TILER_URL: http://vector-tiler:80
      PUBLIC_RASTER_TILER_URL: /raster
      PUBLIC_VECTOR_TILER_URL: /vector
      POSTGRES_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      CORS_ORIGINS: '["http://localhost:5185", "https://${SITE_ADDRESS:-localhost}"]'
      CHECK_DISK_FREE_SPACE: "FALSE"
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPO: ${GITHUB_REPO:-}
    depends_on:
      database:
        condition: service_healthy
      stac-api:
        condition: service_started
      raster-tiler:
        condition: service_started
      vector-tiler:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: frontend
      target: dev
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    ports:
      - "5185:5185"
    environment:
      VITE_API_BASE: ""
      VITE_RASTER_TILER_URL: ""
      VITE_VECTOR_TILER_URL: ""
      API_PROXY_TARGET: http://ingestion:8000
      RASTER_TILER_PROXY_TARGET: http://raster-tiler:80
      COG_TILER_PROXY_TARGET: http://cog-tiler:80
      VECTOR_TILER_PROXY_TARGET: http://vector-tiler:80
      STORAGE_PROXY_TARGET: ${R2_PUBLIC_URL}
      STAC_API_PROXY_TARGET: http://stac-api:8080
    depends_on:
      ingestion:
        condition: service_healthy

  frontend-build:
    build:
      context: frontend
      target: builder
    profiles:
      - prod
    volumes:
      - frontend_dist:/app/dist
    command: ["echo", "Build complete"]

  caddy:
    build:
      context: caddy
    restart: unless-stopped
    profiles:
      - prod
    deploy:
      resources:
        limits:
          memory: 128M
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - frontend_dist:/srv/frontend:ro
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-localhost}
      AUTH_USER: ${AUTH_USER:-demo}
      AUTH_PASSWORD_HASH: ${AUTH_PASSWORD_HASH}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
    depends_on:
      frontend-build:
        condition: service_completed_successfully
      ingestion:
        condition: service_healthy

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  frontend_dist:
