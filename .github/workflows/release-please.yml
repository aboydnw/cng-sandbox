on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        id: app-token
        if: ${{ vars.RELEASE_BOT_ID != '' }}
        with:
          app-id: ${{ vars.RELEASE_BOT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }} # zizmor: ignore[secrets-outside-env]

      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

  deploy:
    needs: release-please
    if: >-
      needs.release-please.outputs.release_created == 'true'
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Deploy to Hetzner VM
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          echo "Deploying ${TAG:-manual trigger}"
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=no \
            -i ~/.ssh/deploy_key \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd ${{ secrets.DEPLOY_PATH }} && git pull && docker compose --profile prod up -d --build"

      - name: Verify deploy health
        run: |
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/deploy_key \
              "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
              "cd ${{ secrets.DEPLOY_PATH }} && docker compose --profile prod ps --format json" \
              | python3 -c "
          import sys, json
          services = [json.loads(line) for line in sys.stdin if line.strip()]
          unhealthy = [s['Service'] for s in services if s.get('Health') not in ('healthy', '')]
          not_running = [s['Service'] for s in services if s['State'] != 'running']
          if not_running:
              print(f'NOT RUNNING: {not_running}')
              sys.exit(1)
          if unhealthy:
              print(f'UNHEALTHY: {unhealthy}')
              sys.exit(1)
          print(f'All {len(services)} services healthy')
          "; then
              exit 0
            fi
            echo "Attempt $i/30 — retrying in 10s"
            sleep 10
          done
          echo "Deploy health check failed after 5 minutes"
          exit 1
