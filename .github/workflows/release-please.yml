on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        if: ${{ vars.RELEASE_BOT_ID != '' }}
        with:
          app-id: ${{ vars.RELEASE_BOT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }} # zizmor: ignore[secrets-outside-env]
          # Scope the app token to only the permissions release-please needs.
          # Without these inputs the token inherits every permission granted
          # to the installation, which zizmor flags as `github-app`.
          permission-contents: write
          permission-pull-requests: write

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

  build-and-push:
    needs: release-please
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ingestion image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ingestion/Dockerfile
          push: true
          tags: |
            ghcr.io/aboydnw/cng-sandbox/ingestion:latest
            ${{ needs.release-please.outputs.tag_name && format('ghcr.io/aboydnw/cng-sandbox/ingestion:{0}', needs.release-please.outputs.tag_name) || '' }}
          cache-from: type=gha,scope=ingestion
          cache-to: type=gha,mode=max,scope=ingestion

      - name: Build and push frontend-build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: frontend
          target: prod-export
          build-args: VITE_VIEWER_ORIGIN=${{ vars.VITE_VIEWER_ORIGIN }}
          push: true
          tags: |
            ghcr.io/aboydnw/cng-sandbox/frontend-build:latest
            ${{ needs.release-please.outputs.tag_name && format('ghcr.io/aboydnw/cng-sandbox/frontend-build:{0}', needs.release-please.outputs.tag_name) || '' }}
          cache-from: type=gha,scope=frontend-build
          cache-to: type=gha,mode=max,scope=frontend-build

  deploy:
    needs: [release-please, build-and-push]
    if: >-
      github.ref == 'refs/heads/main'
      && (needs.release-please.outputs.release_created == 'true'
      || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Configure SSH known hosts
        env:
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          if [ -z "$DEPLOY_KNOWN_HOSTS" ]; then
            echo "::error::DEPLOY_KNOWN_HOSTS secret is not set. Run 'ssh-keyscan <deploy host>' and save the output as the DEPLOY_KNOWN_HOSTS repository secret."
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy to Hetzner VM
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          IMAGE_TAG="${TAG:-latest}"
          echo "Deploying ${TAG:-manual trigger} (IMAGE_TAG=${IMAGE_TAG})"
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=yes \
            -i ~/.ssh/deploy_key \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd ${{ secrets.DEPLOY_PATH }} && git fetch origin main && git checkout main && git reset --hard origin/main && IMAGE_TAG='${IMAGE_TAG}' docker compose --profile prod pull && IMAGE_TAG='${IMAGE_TAG}' docker compose --profile prod up -d && IMAGE_TAG='${IMAGE_TAG}' docker compose --profile prod exec -T caddy caddy reload --config /etc/caddy/Caddyfile"

      - name: Verify deploy health
        run: |
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=yes \
              -i ~/.ssh/deploy_key \
              "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
              "cd ${{ secrets.DEPLOY_PATH }} && docker compose --profile prod ps --format json" \
              | python3 -c "
          import sys, json
          services = [json.loads(line) for line in sys.stdin if line.strip()]
          unhealthy = [s['Service'] for s in services if s.get('Health') not in ('healthy', '')]
          not_running = [s['Service'] for s in services if s['State'] != 'running']
          if not_running:
              print(f'NOT RUNNING: {not_running}')
              sys.exit(1)
          if unhealthy:
              print(f'UNHEALTHY: {unhealthy}')
              sys.exit(1)
          print(f'All {len(services)} services healthy')
          "; then
              exit 0
            fi
            echo "Attempt $i/30 — retrying in 10s"
            sleep 10
          done
          echo "Deploy health check failed after 5 minutes"
          exit 1
