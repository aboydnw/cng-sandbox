name: Uptime Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions: {}

jobs:
  health-check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check site health
        id: health
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -u "${{ secrets.SITE_AUTH_USER }}:${{ secrets.SITE_AUTH_PASSWORD }}" \
            --max-time 30 \
            "https://cngsandbox.org/api/health" || echo "000")
          echo "status=$HTTP_STATUS" >> "$GITHUB_OUTPUT"
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Site is healthy (HTTP $HTTP_STATUS)"
          else
            echo "Site is DOWN (HTTP $HTTP_STATUS)"
          fi

      - name: Open issue if down
        if: steps.health.outputs.status != '200'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "incident" \
            --state open \
            --search "Site health check failing" \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" \
              --repo "${{ github.repository }}" \
              --body "Still down as of $(date -u '+%Y-%m-%d %H:%M UTC'). HTTP status: ${{ steps.health.outputs.status }}"
          else
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "Site health check failing (HTTP ${{ steps.health.outputs.status }})" \
              --label "incident" \
              --body "$(cat <<'BODY'
The uptime monitor detected that cngsandbox.org is not responding.

- **HTTP status**: ${{ steps.health.outputs.status }}
- **Endpoint**: `https://cngsandbox.org/api/health`
- **Time**: $(date -u '+%Y-%m-%d %H:%M UTC')

## Troubleshooting

SSH into the VM and check:
\`\`\`bash
docker compose --profile prod ps
docker compose --profile prod logs --tail 50
\`\`\`

If services are down, restart:
\`\`\`bash
docker compose --profile prod up -d --build
\`\`\`
BODY
)"
          fi

      - name: Close issue if recovered
        if: steps.health.outputs.status == '200'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "incident" \
            --state open \
            --search "Site health check failing" \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" \
              --repo "${{ github.repository }}" \
              --body "Recovered as of $(date -u '+%Y-%m-%d %H:%M UTC'). Closing."
            gh issue close "$EXISTING" \
              --repo "${{ github.repository }}"
          fi
