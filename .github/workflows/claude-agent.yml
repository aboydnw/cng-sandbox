name: Claude Code Agent

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, labeled]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions: {}

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' &&
       contains(github.event.issue.labels.*.name, 'agent-ready')) ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' &&
       contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    environment: claude-agent
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4 # zizmor: ignore[artipacked]
        with:
          fetch-depth: 1

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Install backend deps
        run: |
          sudo apt-get update && sudo apt-get install -y libmagic1
          pip install -e "geo-conversions[all]"
          pip install -e "ingestion[dev]"

      - name: Install frontend deps
        run: cd frontend && corepack enable && yarn install --immutable

      - uses: anthropics/claude-code-action@5d5c10a4f389689f992ea10bb14dcb6fcc83146d # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "Bash(cd frontend && npx vitest run),Bash(cd frontend && npx eslint *),Bash(cd frontend && npx tsc --noEmit),Bash(cd frontend && npx prettier --check *),Bash(cd ingestion && python -m pytest *),Bash(ruff check *),Bash(ruff format --check *),Bash(git *),Read,Write,Edit,Glob,Grep"
