name: CNG Sandbox CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ingestion
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libmagic1

      - name: Install cng-toolkit
        run: pip install -e "../geo-conversions[all]"

      - name: Install ingestion deps
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: pip install ruff && ruff check src/ tests/

      - name: Run tests
        run: python -m pytest tests/ -v --ignore=tests/test_integration.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - name: Lint
        run: npx eslint src/

      - run: npx tsc --noEmit

      - run: npx vitest run

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: docker compose build
