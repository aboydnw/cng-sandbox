on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        if: ${{ vars.RELEASE_BOT_ID != '' }}
        with:
          app-id: ${{ vars.RELEASE_BOT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }} # zizmor: ignore[secrets-outside-env]

      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

  build-and-push:
    needs: release-please
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ingestion image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ingestion/Dockerfile
          push: true
          tags: |
            ghcr.io/aboydnw/cng-sandbox/ingestion:latest
            ${{ needs.release-please.outputs.tag_name && format('ghcr.io/aboydnw/cng-sandbox/ingestion:{0}', needs.release-please.outputs.tag_name) || '' }}
          cache-from: type=gha,scope=ingestion
          cache-to: type=gha,mode=max,scope=ingestion

      - name: Build and push frontend-build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: frontend
          target: builder
          build-args: VITE_VIEWER_ORIGIN=${{ vars.VITE_VIEWER_ORIGIN }}
          push: true
          tags: |
            ghcr.io/aboydnw/cng-sandbox/frontend-build:latest
            ${{ needs.release-please.outputs.tag_name && format('ghcr.io/aboydnw/cng-sandbox/frontend-build:{0}', needs.release-please.outputs.tag_name) || '' }}
          cache-from: type=gha,scope=frontend-build
          cache-to: type=gha,mode=max,scope=frontend-build

  deploy:
    needs: [release-please, build-and-push]
    if: >-
      github.ref == 'refs/heads/main'
      && (needs.release-please.outputs.release_created == 'true'
      || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Deploy to Hetzner VM
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          IMAGE_TAG="${TAG:-latest}"
          echo "Deploying ${TAG:-manual trigger} (IMAGE_TAG=${IMAGE_TAG})"
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=no \
            -i ~/.ssh/deploy_key \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd ${{ secrets.DEPLOY_PATH }} && git checkout main && git pull origin main && IMAGE_TAG='${IMAGE_TAG}' docker compose --profile prod pull && IMAGE_TAG='${IMAGE_TAG}' docker compose --profile prod up -d"

      - name: Verify deploy health
        run: |
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/deploy_key \
              "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
              "cd ${{ secrets.DEPLOY_PATH }} && docker compose --profile prod ps --format json" \
              | python3 -c "
          import sys, json
          services = [json.loads(line) for line in sys.stdin if line.strip()]
          unhealthy = [s['Service'] for s in services if s.get('Health') not in ('healthy', '')]
          not_running = [s['Service'] for s in services if s['State'] != 'running']
          if not_running:
              print(f'NOT RUNNING: {not_running}')
              sys.exit(1)
          if unhealthy:
              print(f'UNHEALTHY: {unhealthy}')
              sys.exit(1)
          print(f'All {len(services)} services healthy')
          "; then
              exit 0
            fi
            echo "Attempt $i/30 — retrying in 10s"
            sleep 10
          done
          echo "Deploy health check failed after 5 minutes"
          exit 1
