name: CNG Sandbox CI

on:
  push:
    branches: [main]
  pull_request:

permissions: read-all

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ingestion
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libmagic1

      - name: Install cng-toolkit
        run: pip install -e "../geo-conversions[all]"

      - name: Install ingestion deps
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: pip install ruff && ruff check src/ tests/

      - name: Check formatting with ruff
        run: ruff format --check src/ tests/

      - name: Run tests
        run: python -m pytest tests/ -v --ignore=tests/test_integration.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - run: npm ci

      - name: Lint
        run: npx eslint src/

      - name: Check formatting
        run: npx prettier --check 'src/**/*.{ts,tsx,css}'

      - run: npx tsc --noEmit

      - run: npx vitest run

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - run: cp .env.example .env
      - run: docker compose build
